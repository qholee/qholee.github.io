            <a rel = "gallery-1" href="images/system/system.png" class="swipebox" title="SYSTEM<br/>System is a typeface based on my memories of a chair. During my military service, I spent a lot of my time at internet cafes (PC 방) in South Korea. I was part of the KATUSA program which meant I was one of the lucky ones who could leave post on weekends."> 
            <div class="container"><img src="images/system/box1.png" alt="SYSTEM"title="SYSTEM" id="images"> </a> </div>
            
            <a rel="gallery-1" href="images/system/system2.png" class="swipebox" title="As someone who left Korea at one, this was my first experience living in Korea for an extended period of time. I tried hard to reconnect with Korea and the people both in and out of post. "></a>
                   
            <a rel="gallery-1" href="images/system/system3.png" class="swipebox" title="But I also reconnected with many of the social and cultural issues that South Korea has: the rampant sexism that exists as a result of a traditional patriarchy influenced by Confucius, the lack of mental health support, and the widespread elitism based on social status and education to name a few."></a>
                        
            <a rel="gallery-1" href="images/system/system4.png" class="swipebox" title="System is an ode to the pain in South Korea that I felt during my service. The typographic forms are inspired by gaming chairs, army ranks and the Korean flag."></a>
